services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing myminio/ew-system &&
      mc policy set public myminio/ew-system &&
      exit 0

  backend:
    build:
      context: ./backend
    ports:
      - "8083:8080"
    environment:
      # Must be >= 256-bit for HS256 (jjwt enforces this).
      EW_JWT_SECRET: "dev-only-secret-change-me-dev-only-secret-change-me-dev-only-secret-change-me"
      EW_DEV_ADMIN_PASSWORD: "Admin123"
      EW_S3_ENDPOINT: "http://minio:9000"
      EW_S3_REGION: "us-east-1"
      EW_S3_BUCKET: "ew-system"
      EW_S3_ACCESS_KEY: "minioadmin"
      EW_S3_SECRET_KEY: "minioadmin"
      EW_GEODATA_DIR: "/app/assets/geodata"
      EW_STORAGE_TYPE: "s3"
      # NOTE: GeoJSON generation depends on the mounted assets/geodata volume (see volumes).
    volumes:
      - ./../assets:/app/assets
    depends_on:
      - minio-init

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  minio-data:

