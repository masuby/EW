<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hazard: Landslides (Maporomoko ya Ardhi) -->
  <polygon points="100,15 190,175 10,175" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <g transform="translate(100,110)">
    <!-- Mountain silhouette with landslide -->
    <path d="M-42,30 L-8,-30 L2,-16 L30,-35 L42,30 Z" fill="#1a1a1a" stroke="none"/>
    <!-- Scar / slide path cut into mountain (lighter) -->
    <path d="M-16,-10 L-8,-26 L0,-14 L-6,4 L-20,20 L-28,30 L-14,30 L-4,14 L2,-2 Z" fill="white" stroke="none" opacity="0.35"/>
    <!-- Falling boulders -->
    <g fill="#1a1a1a" stroke="none">
      <circle cx="-26" cy="-14" r="4.5"/>
      <circle cx="-34" cy="-4" r="3.5"/>
      <circle cx="-20" cy="-4" r="3"/>
      <circle cx="-30" cy="6" r="4"/>
      <circle cx="-18" cy="8" r="2.5"/>
      <circle cx="-24" cy="-22" r="2.5"/>
    </g>
  </g>
</svg>
