<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple white mountain with debris -->
  <g fill="white" stroke="none">
    <!-- Mountain -->
    <polygon points="50,12 88,88 12,88"/>
    <!-- Slide scar (cut-out) -->
    <polygon points="38,45 50,16 56,38 48,60 30,78 20,88 40,88" fill="none" stroke="white" stroke-width="2" opacity="0"/>
  </g>
  <!-- Debris rocks -->
  <g fill="none" stroke="white" stroke-width="0">
    <!-- Make mountain solid white, add dark cut for landslide -->
  </g>
  <!-- Redraw as outline style to match others -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="50,12 88,88 12,88" fill="white" fill-opacity="0"/>
    <!-- Slide path -->
    <path d="M42,42 L50,16 L56,36 L48,58 L34,80 L24,88" fill="none" stroke-width="3"/>
    <!-- Falling rocks -->
    <circle cx="28" cy="50" r="5" fill="white"/>
    <circle cx="20" cy="62" r="4" fill="white"/>
    <circle cx="34" cy="64" r="3.5" fill="white"/>
    <circle cx="24" cy="74" r="4.5" fill="white"/>
  </g>
</svg>
