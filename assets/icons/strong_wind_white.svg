<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple white wind curves -->
  <g fill="none" stroke="white" stroke-width="5" stroke-linecap="round">
    <!-- Top gust curving up -->
    <path d="M10,32 L60,32 Q78,32 78,20 Q78,10 66,12"/>
    <!-- Middle gust straight -->
    <path d="M10,52 L70,52 Q88,52 88,40 Q88,30 76,32"/>
    <!-- Bottom gust curving down -->
    <path d="M10,72 L56,72 Q72,72 72,82 Q72,92 60,90"/>
  </g>
</svg>
