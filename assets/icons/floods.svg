<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hazard: Flooding (Mafuriko) -->
  <polygon points="100,15 190,175 10,175" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <g transform="translate(100,104)">
    <!-- House roof -->
    <path d="M-24,-18 L0,-36 L24,-18" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- House walls -->
    <rect x="-20" y="-18" width="40" height="28" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Door -->
    <rect x="-6" y="-8" width="12" height="18" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
    <!-- Window left -->
    <rect x="-17" y="-14" width="8" height="7" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Window right -->
    <rect x="9" y="-14" width="8" height="7" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Water waves covering lower portion -->
    <path d="M-48,10 Q-38,2 -28,10 Q-18,18 -8,10 Q2,2 12,10 Q22,18 32,10 Q42,2 48,10" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
    <path d="M-50,22 Q-40,14 -30,22 Q-20,30 -10,22 Q0,14 10,22 Q20,30 30,22 Q40,14 50,22" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
