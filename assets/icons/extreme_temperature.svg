<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hazard: Extreme Temperature (Joto/Baridi Kali) -->
  <polygon points="100,15 190,175 10,175" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <g transform="translate(100,106)">
    <!-- Thermometer tube -->
    <rect x="-6" y="-40" width="12" height="52" rx="6" ry="6" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Thermometer bulb -->
    <circle cx="0" cy="20" r="14" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Mercury fill -->
    <rect x="-3" y="-22" width="6" height="34" rx="3" fill="#1a1a1a"/>
    <circle cx="0" cy="20" r="9" fill="#1a1a1a"/>
    <!-- Scale marks on right -->
    <g stroke="#1a1a1a" stroke-width="2">
      <line x1="6" y1="-32" x2="14" y2="-32"/>
      <line x1="6" y1="-22" x2="14" y2="-22"/>
      <line x1="6" y1="-12" x2="14" y2="-12"/>
      <line x1="6" y1="-2" x2="14" y2="-2"/>
    </g>
    <!-- Sun rays (top right) -->
    <g stroke="#1a1a1a" stroke-width="3" stroke-linecap="round">
      <line x1="24" y1="-32" x2="34" y2="-32"/>
      <line x1="22" y1="-20" x2="32" y2="-16"/>
      <line x1="22" y1="-44" x2="32" y2="-48"/>
    </g>
    <!-- Snowflake (top left) -->
    <g stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round">
      <line x1="-22" y1="-36" x2="-32" y2="-36"/>
      <line x1="-27" y1="-42" x2="-27" y2="-30"/>
      <line x1="-23" y1="-40" x2="-31" y2="-32"/>
      <line x1="-31" y1="-40" x2="-23" y2="-32"/>
    </g>
  </g>
</svg>
