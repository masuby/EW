<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hazard: Drought (Ukame) -->
  <polygon points="100,15 190,175 10,175" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <g transform="translate(100,100)">
    <!-- Sun at top -->
    <circle cx="0" cy="-32" r="10" fill="none" stroke="#1a1a1a" stroke-width="3.5"/>
    <!-- Sun rays -->
    <g stroke="#1a1a1a" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-46" x2="0" y2="-50"/>
      <line x1="12" y1="-38" x2="16" y2="-42"/>
      <line x1="14" y1="-32" x2="20" y2="-32"/>
      <line x1="12" y1="-26" x2="16" y2="-22"/>
      <line x1="0" y1="-18" x2="0" y2="-14"/>
      <line x1="-12" y1="-26" x2="-16" y2="-22"/>
      <line x1="-14" y1="-32" x2="-20" y2="-32"/>
      <line x1="-12" y1="-38" x2="-16" y2="-42"/>
    </g>
    <!-- Cracked dry earth -->
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none">
      <line x1="-34" y1="10" x2="34" y2="10"/>
      <line x1="-14" y1="10" x2="-18" y2="30"/>
      <line x1="10" y1="10" x2="16" y2="32"/>
      <line x1="-2" y1="10" x2="0" y2="26"/>
      <line x1="-18" y1="30" x2="-30" y2="36"/>
      <line x1="-18" y1="30" x2="-8" y2="38"/>
      <line x1="16" y1="32" x2="28" y2="36"/>
      <line x1="16" y1="32" x2="8" y2="40"/>
    </g>
  </g>
</svg>
