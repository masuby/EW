<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple white thermometer -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Thermometer tube -->
    <rect x="40" y="10" width="20" height="56" rx="10" ry="10"/>
    <!-- Thermometer bulb -->
    <circle cx="50" cy="74" r="16"/>
    <!-- Mercury fill -->
    <rect x="46" y="30" width="8" height="30" rx="4" fill="white" stroke="none"/>
    <circle cx="50" cy="74" r="10" fill="white" stroke="none"/>
    <!-- Scale marks -->
    <line x1="60" y1="22" x2="68" y2="22"/>
    <line x1="60" y1="34" x2="68" y2="34"/>
    <line x1="60" y1="46" x2="68" y2="46"/>
  </g>
</svg>
