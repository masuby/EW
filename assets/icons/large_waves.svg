<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hazard: Large Waves (Mawimbi Makubwa) -->
  <polygon points="100,15 190,175 10,175" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
  <g transform="translate(100,112)" stroke="#1a1a1a" fill="none" stroke-linecap="round">
    <!-- Three stacked waves, centered -->
    <path d="M-40,-24 Q-30,-36 -20,-24 Q-10,-12 0,-24 Q10,-36 20,-24 Q30,-12 40,-24" stroke-width="4.5"/>
    <path d="M-44,-6 Q-33,-18 -22,-6 Q-11,6 0,-6 Q11,-18 22,-6 Q33,6 44,-6" stroke-width="4.5"/>
    <path d="M-48,12 Q-36,0 -24,12 Q-12,24 0,12 Q12,0 24,12 Q36,24 48,12" stroke-width="4.5"/>
    <!-- Spray dots above top wave -->
    <g fill="#1a1a1a" stroke="none">
      <circle cx="-10" cy="-38" r="2.5"/>
      <circle cx="2" cy="-42" r="2"/>
      <circle cx="10" cy="-38" r="2.5"/>
      <circle cx="-20" cy="-36" r="2"/>
      <circle cx="20" cy="-36" r="2"/>
    </g>
  </g>
</svg>
